{% extends 'kakeibo/base.html' %}
{% load humanize %}

{% block content %}
<h2 class="mb-4">
    {% if item %}特別費を編集{% else %}特別費を追加{% endif %}
</h2>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">日付</label>
        <input type="date" name="date" class="form-control"
               value="{{ item.date|date:'Y-m-d' }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">種類</label>
        <select name="type" class="form-control" required>
            {% for t in types %}
                <option value="{{ t.id }}"
                    {% if item and item.type.id == t.id %}selected{% endif %}>
                    {{ t.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">金額</label>
        <input type="number" name="amount" class="form-control"
               value="{{ item.amount }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">メモ</label>
        <textarea name="memo" class="form-control">{{ item.memo }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">
        {% if item %}更新{% else %}登録{% endif %}
    </button>
    <a href="{% url 'special_list' %}" class="btn btn-secondary">戻る</a>
</form>

{% endblock %}
