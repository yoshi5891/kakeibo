<form method="post" action="/upload/" enctype="multipart/form-data">
    {% csrf_token %}

    <p>
        <label>レシートを撮影（iPhoneはカメラ起動）</label><br>
        <input type="file" name="image" accept="image/*" capture="camera" required>
    </p>

    <label>OCR モード</label>
    <select name="mode">
        <option value="iphone">iPhone写真用（推奨）</option>
        <option value="normal">標準</option>
        <option value="receipt">レシート（薄い印字）</option>
        <option value="smaregi">スマレジ（白飛び）</option>
    </select>

    <button type="submit">読み取る</button>
</form>

{% if text %}
    <h4>OCR 読み取り結果（確認用）</h4>
    <pre>{{ text }}</pre>
{% endif %}

{% if total %}
<p><strong>合計金額：</strong> {{ total }} 円</p>
{% endif %}
