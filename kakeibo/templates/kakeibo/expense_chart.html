{% extends 'kakeibo/base.html' %}

{% block title %}カテゴリ別グラフ{% endblock %}

{% block content %}
<h2 class="mb-4">カテゴリ別支出（円グラフ）</h2>

<canvas id="pieChart" width="400" height="400"></canvas>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('pieChart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: {{ labels|safe }},
            datasets: [{
                data: {{ totals|safe }},
                backgroundColor: [
                    '#ff6384',
                    '#36a2eb',
                    '#ffcd56',
                    '#4bc0c0',
                    '#9966ff',
                    '#ff9f40'
                ],
            }]
        },
    });
</script>

<a href="{% url 'expense_list' %}" class="btn btn-secondary mt-3">一覧に戻る</a>
{% endblock %}
