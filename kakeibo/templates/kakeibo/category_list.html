{% extends 'kakeibo/base.html' %}

{% block content %}
<div class="card mb-4">
    <div class="card-body">

        <h2 class="mb-4">カテゴリ一覧</h2>

        <a href="{% url 'category_add' %}" class="btn btn-success mb-3">カテゴリ追加</a>

        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>カテゴリ名</th>
                    <th style="width: 150px;">操作</th>
                </tr>
            </thead>
            <tbody>
                {% for category in categories %}
                <tr>
                    <td>
                        <span style="color: {{ category.color }}; font-size: 1.2rem;">●</span>
                        {{ category.name }}
                    </td>
                    <td>
                        <a href="{% url 'category_edit' category.id %}" class="btn btn-sm btn-primary">編集</a>
                        <a href="{% url 'category_delete' category.id %}" 
                            class="btn btn-sm btn-danger"
                            onclick="return confirm('本当に削除しますか？');">
                        削除
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">カテゴリがありません</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>
{% endblock %}

{{ c.name }}（{{ c.count }} 件）
